<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>룰루피치 대시보드 — 데이터 업로드</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
<header>
  <div>
    <h1>데이터 업로드 (관리자 전용)</h1>
    <div class="sub">여기서 올린 데이터는 즉시 팀 전체가 보는 화면(index.html)에 반영됩니다</div>
  </div>
</header>
<main>
  <div class="admin-panel">
    <div class="field">
      <label>GitHub Personal Access Token (repo 쓰기 권한)</label>
      <input type="password" id="tokenInput" placeholder="ghp_로 시작하는 토큰">
      <div class="note" style="margin-top:6px">
        이 브라우저에만 저장되고, 다른 사람에게 보이거나 GitHub에 올라가지 않습니다.
        <span id="clearTokenBtn" style="color:var(--red);cursor:pointer;text-decoration:underline">토큰 지우기</span>
      </div>
    </div>

    <div class="field">
      <label>① 메타 광고 리포트 (.xlsx)</label>
      <div class="drop" id="dropMeta">파일을 드래그하거나 클릭해서 선택</div>
      <input type="file" id="fileMeta" accept=".xlsx,.xls" style="display:none">
    </div>
    <div class="field">
      <label>② 카페24 UTM 실매출 (.csv)</label>
      <div class="drop" id="dropUtm">파일을 드래그하거나 클릭해서 선택</div>
      <input type="file" id="fileUtm" accept=".csv" style="display:none">
    </div>
    <div class="field">
      <label>업로드한 사람</label>
      <input type="text" id="uploaderInput" placeholder="예: 김일수">
    </div>

    <div style="display:flex;gap:8px">
      <button class="sec" id="previewBtn">미리보기 계산</button>
      <button class="pri" id="publishBtn" disabled>팀 화면에 게시하기</button>
    </div>
    <div id="statusMsg"></div>
  </div>

  <div id="previewRoot" style="margin-top:24px"></div>
</main>

<script src="assets/dashboard-logic.js"></script>
<script>
const REPO = "shub548/lulu";
const BRANCH = "main";
const DATA_PATH = "data.json";

const tokenInput = document.getElementById("tokenInput");
const clearTokenBtn = document.getElementById("clearTokenBtn");
const statusMsg = document.getElementById("statusMsg");
const previewBtn = document.getElementById("previewBtn");
const publishBtn = document.getElementById("publishBtn");
const previewRoot = document.getElementById("previewRoot");

let metaFile = null, utmFile = null, computedState = null;

// 토큰: 이 브라우저에만 저장 (localStorage — 사이트 자체의 로컬 저장소, 다른 사람 화면과 공유되지 않음)
tokenInput.value = localStorage.getItem("gh_token") || "";
tokenInput.addEventListener("input", () => localStorage.setItem("gh_token", tokenInput.value));
clearTokenBtn.addEventListener("click", () => { localStorage.removeItem("gh_token"); tokenInput.value = ""; });

function setupDrop(dropEl, inputEl, onFile) {
  dropEl.addEventListener("click", () => inputEl.click());
  dropEl.addEventListener("dragover", (e) => { e.preventDefault(); dropEl.classList.add("over"); });
  dropEl.addEventListener("dragleave", () => dropEl.classList.remove("over"));
  dropEl.addEventListener("drop", (e) => {
    e.preventDefault(); dropEl.classList.remove("over");
    const f = e.dataTransfer.files[0];
    if (f) { onFile(f); showChip(dropEl, f.name); }
  });
  inputEl.addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (f) { onFile(f); showChip(dropEl, f.name); }
  });
}
function showChip(dropEl, name) {
  dropEl.innerHTML = `<span class="filechip"><b>${name}</b></span>`;
}
setupDrop(document.getElementById("dropMeta"), document.getElementById("fileMeta"), (f) => metaFile = f);
setupDrop(document.getElementById("dropUtm"), document.getElementById("fileUtm"), (f) => utmFile = f);

function showStatus(msg, ok) {
  statusMsg.innerHTML = `<div class="status-msg ${ok ? "ok" : "err"}">${msg}</div>`;
}

previewBtn.addEventListener("click", async () => {
  if (!metaFile || !utmFile) { showStatus("메타 xlsx와 카페24 csv 파일을 모두 선택해주세요.", false); return; }
  statusMsg.innerHTML = "";
  previewBtn.disabled = true;
  previewBtn.textContent = "계산 중...";
  try {
    const [metaRows, utmRows] = await Promise.all([parseMetaFile(metaFile), parseUtmFile(utmFile)]);
    const [mS, mE] = dateRangeOf(metaRows);
    const [uS, uE] = dateRangeOf(utmRows);
    const dateStart = mS && uS ? (mS > uS ? mS : uS) : (mS || uS);
    const dateEnd = mE && uE ? (mE < uE ? mE : uE) : (mE || uE);
    computedState = {
      metaRows, utmRows, settings: DEFAULT_SETTINGS, dateStart, dateEnd,
      uploader: document.getElementById("uploaderInput").value || "익명",
      savedAt: new Date().toISOString(),
    };
    renderDashboard(previewRoot, computedState);
    publishBtn.disabled = false;
    showStatus("미리보기 계산 완료. 아래 내용 확인 후 게시하세요.", true);
  } catch (e) {
    showStatus("파일을 읽는 중 문제가 발생했습니다: " + e.message, false);
  } finally {
    previewBtn.disabled = false;
    previewBtn.textContent = "미리보기 계산";
  }
});

async function ghRequest(method, body) {
  const token = localStorage.getItem("gh_token");
  const headers = { Authorization: "token " + token, Accept: "application/vnd.github+json" };
  if (body) headers["Content-Type"] = "application/json";
  return fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_PATH}`, {
    method, headers, body: body ? JSON.stringify(body) : undefined,
  });
}

publishBtn.addEventListener("click", async () => {
  const token = localStorage.getItem("gh_token");
  if (!token) { showStatus("GitHub 토큰을 먼저 입력해주세요.", false); return; }
  if (!computedState) { showStatus("먼저 '미리보기 계산'을 실행해주세요.", false); return; }
  publishBtn.disabled = true;
  publishBtn.textContent = "게시 중...";
  try {
    let sha = null;
    const getRes = await ghRequest("GET");
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
    else if (getRes.status !== 404) throw new Error("현재 파일 조회 실패 (상태 " + getRes.status + ")");

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(computedState))));
    const putRes = await ghRequest("PUT", {
      message: `데이터 갱신 (${computedState.uploader}, ${computedState.dateStart}~${computedState.dateEnd})`,
      content, branch: BRANCH, ...(sha ? { sha } : {}),
    });
    if (!putRes.ok) {
      const j = await putRes.json().catch(() => ({}));
      throw new Error(j.message || ("게시 실패 (상태 " + putRes.status + ")"));
    }
    showStatus('게시 완료! <a class="viewlink" href="index.html" target="_blank">팀 화면 열어보기 →</a>', true);
  } catch (e) {
    showStatus("게시 중 오류: " + e.message + " (토큰 권한을 확인해주세요)", false);
  } finally {
    publishBtn.disabled = false;
    publishBtn.textContent = "팀 화면에 게시하기";
  }
});
</script>
</body>
</html>
