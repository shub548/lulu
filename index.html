<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>룰루피치 광고 판정 대시보드</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header>
  <div>
    <h1>룰루피치 광고 판정 대시보드</h1>
    <div class="sub" id="header-sub">불러오는 중...</div>
  </div>
</header>
<main>
  <div id="root">
    <div class="empty-state">불러오는 중...</div>
  </div>
</main>

<script src="assets/dashboard-logic.js"></script>
<script>
(async function () {
  const root = document.getElementById("root");
  const sub = document.getElementById("header-sub");
  try {
    const res = await fetch("data.json?t=" + Date.now());
    if (!res.ok) throw new Error("no data");
    const state = await res.json();
    sub.textContent = "읽기 전용 · 관리자 페이지(admin.html)에서 데이터를 갱신할 수 있습니다";
    renderDashboard(root, state);
  } catch (e) {
    sub.textContent = "";
    root.innerHTML = '<div class="empty-state">아직 업로드된 데이터가 없습니다.<br>관리자에게 데이터 업로드를 요청해주세요. (admin.html)</div>';
  }
})();
</script>
</body>
</html>
